<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="logo.png">
  <title>Message envoyé — DB Digital</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,300;0,400;1,400&family=Inter:wght@200;300;400&display=swap" rel="stylesheet">
  <style>
    :root { --gold:#C5A059; --bg:#0F172A; }
    *,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
    body {
      background-color: var(--bg);
      color: #E8E0D5;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* GRAIN */
    body::after {
      content:'';
      position:fixed; inset:0;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 300 300' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events:none; z-index:9998; opacity:0.5;
    }

    /* Aurora */
    .aurora {
      position: fixed; inset: 0; pointer-events: none; overflow: hidden;
    }
    .orb {
      position: absolute; border-radius: 50%; filter: blur(120px);
      animation: float 8s ease-in-out infinite;
    }
    .orb-1 { width:500px;height:500px;background:radial-gradient(circle,rgba(197,160,89,.1),transparent 70%);top:-10%;left:5%;animation-delay:0s; }
    .orb-2 { width:350px;height:350px;background:radial-gradient(circle,rgba(197,160,89,.07),transparent 70%);bottom:5%;right:10%;animation-delay:3s;animation-duration:11s; }
    @keyframes float {
      0%,100% { opacity:.4;transform:translate(0,0) scale(1); }
      50%      { opacity:.8;transform:translate(20px,-20px) scale(1.08); }
    }

    /* Card */
    .card {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 72px 56px;
      border: .5px solid rgba(197,160,89,.25);
      background: rgba(197,160,89,.03);
      max-width: 520px;
      width: 90%;
      animation: fadeUp .9s cubic-bezier(.16,1,.3,1) forwards;
      opacity: 0;
    }
    @keyframes fadeUp {
      from { opacity:0; transform:translateY(30px); }
      to   { opacity:1; transform:translateY(0); }
    }

    /* Checkmark animé */
    .check-wrap {
      width: 64px; height: 64px;
      border: .5px solid rgba(197,160,89,.3);
      background: rgba(197,160,89,.06);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 32px;
      animation: fadeUp .9s cubic-bezier(.16,1,.3,1) .15s forwards;
      opacity: 0;
    }
    .check-wrap svg { stroke-dasharray: 30; stroke-dashoffset: 30; animation: drawCheck .6s ease .6s forwards; }
    @keyframes drawCheck { to { stroke-dashoffset: 0; } }

    .eyebrow {
      font-size: .65rem; letter-spacing: .4em; text-transform: uppercase;
      color: var(--gold); display: block; margin-bottom: 16px;
      animation: fadeUp .9s cubic-bezier(.16,1,.3,1) .2s forwards; opacity: 0;
    }
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 5vw, 2.8rem);
      font-weight: 300; line-height: 1.15;
      color: #E8E0D5; margin-bottom: 16px;
      animation: fadeUp .9s cubic-bezier(.16,1,.3,1) .3s forwards; opacity: 0;
    }
    h1 em { font-style: italic; color: var(--gold); }

    .divider {
      width: 48px; height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 20px auto;
      animation: fadeUp .9s cubic-bezier(.16,1,.3,1) .35s forwards; opacity: 0;
    }

    p {
      font-size: .9rem; font-weight: 300;
      color: rgba(232,224,213,.5); line-height: 1.8;
      max-width: 360px; margin: 0 auto 40px;
      animation: fadeUp .9s cubic-bezier(.16,1,.3,1) .4s forwards; opacity: 0;
    }

    .btn-back {
      display: inline-flex; align-items: center; gap: 10px;
      padding: 14px 36px;
      border: .5px solid var(--gold);
      color: var(--gold);
      font-family: 'Inter', sans-serif;
      font-size: .72rem; letter-spacing: .18em; text-transform: uppercase;
      text-decoration: none;
      background: transparent;
      position: relative; overflow: hidden;
      transition: color .35s ease;
      animation: fadeUp .9s cubic-bezier(.16,1,.3,1) .5s forwards; opacity: 0;
    }
    .btn-back::before {
      content:''; position:absolute; inset:0;
      background:var(--gold); transform:scaleX(0);
      transform-origin:left; transition:transform .35s cubic-bezier(.16,1,.3,1);
    }
    .btn-back:hover::before { transform:scaleX(1); }
    .btn-back:hover { color: var(--bg); }
    .btn-back > * { position: relative; z-index: 1; }

    /* Logo bas de page */
    .logo-foot {
      position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%);
      font-family: 'Playfair Display', serif;
      font-size: .7rem; letter-spacing: .3em; text-transform: uppercase;
      color: rgba(197,160,89,.3);
      z-index: 10;
    }
  </style>
</head>
<body>

  <div class="aurora">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
  </div>

  <div class="card">
    <div class="check-wrap">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#C5A059" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
    </div>

    <span class="eyebrow">Message reçu</span>

    <h1>Merci pour<br><em>votre confiance</em></h1>

    <div class="divider"></div>

    <p>Votre message a bien été transmis. Je vous réponds dans les plus brefs délais — en général sous 24 heures.</p>

    <a href="/" class="btn-back">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      <span>Retour au site</span>
    </a>
  </div>

  <p class="logo-foot">DB Digital · Vallée de l'Arve</p>

</body>
</html>
