<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DB Artisan Digital</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold: #C5A059;
      --bg: #0F172A;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--bg);
      color: #E8E0D5;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
    }

    h1 { font-family: 'Playfair Display', serif; }

    /* HERO */
    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 24px 120px;
      background: radial-gradient(ellipse 70% 50% at 50% 0%, rgba(197,160,89,0.07) 0%, transparent 70%);
    }

    .logo-container {
      width: 180px; /* Taille ajustée pour la lisibilité */
      margin: 0 auto 40px;
    }

    .logo-container img {
      width: 100%;
      height: auto;
      display: block;
    }

    .hero h1 {
      font-size: clamp(2.2rem, 6vw, 4.5rem);
      font-weight: 400;
      line-height: 1.15;
      color: #E8E0D5;
      max-width: 820px;
      margin-bottom: 20px;
    }

    .hero h1 em {
      font-style: italic;
      color: var(--gold);
    }

    .hero p {
      font-size: 1rem;
      font-weight: 300;
      color: rgba(232,224,213,0.55);
      max-width: 480px;
      line-height: 1.7;
      margin-bottom: 48px;
    }

    /* BOUTON */
    .btn-gold {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 15px 40px;
      border: 0.5px solid var(--gold);
      color: var(--gold);
      font-family: 'Inter', sans-serif;
      font-size: 0.78rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      background: transparent;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: color 0.35s ease;
      text-decoration: none;
    }

    .btn-gold::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--gold);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.35s ease;
    }

    .btn-gold:hover::before { transform: scaleX(1); }
    .btn-gold:hover { color: var(--bg); }
    .btn-gold span { position: relative; z-index: 1; }

    /* MODAL */
    #modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(9, 14, 26, 0.88);
      backdrop-filter: blur(10px);
      z-index: 9000;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    #modal-overlay.open { display: flex; }

    #modal-box {
      background: #0F172A;
      border: 0.5px solid rgba(197,160,89,0.35);
      padding: 48px 36px;
      width: 100%;
      max-width: 420px;
      position: relative;
      animation: modalIn 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes modalIn {
      from { opacity: 0; transform: translateY(20px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .modal-label {
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold);
      display: block;
      margin-bottom: 10px;
    }

    .modal-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.9rem;
      color: #E8E0D5;
      margin-bottom: 32px;
      font-weight: 400;
    }

    .modal-input {
      width: 100%;
      background: rgba(255,255,255,0.03);
      border: 0.5px solid rgba(197,160,89,0.25);
      padding: 13px 16px;
      color: #E8E0D5;
      font-family: 'Inter', sans-serif;
      font-size: 0.85rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      outline: none;
      transition: border-color 0.3s;
    }

    .modal-input:focus { border-color: var(--gold); }
    .modal-input::placeholder { color: rgba(232,224,213,0.25); }

    .modal-input.shake {
      animation: shake 0.4s ease;
      border-color: #E05252;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%       { transform: translateX(-8px); }
      40%       { transform: translateX(8px); }
      60%       { transform: translateX(-5px); }
      80%       { transform: translateX(5px); }
    }

    .error-msg {
      font-size: 0.75rem;
      color: #E05252;
      margin-top: 10px;
      min-height: 18px;
      letter-spacing: 0.05em;
    }

    .modal-close {
      position: absolute;
      top: 18px;
      right: 22px;
      background: none;
      border: none;
      color: rgba(232,224,213,0.35);
      font-size: 1.5rem;
      cursor: pointer;
      line-height: 1;
      transition: color 0.2s;
    }

    .modal-close:hover { color: #E8E0D5; }

    /* STICKY CTA MOBILE */
    .sticky-cta {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 500;
      display: flex;
    }

    @media (min-width: 768px) {
      .sticky-cta { display: none; }
    }

    .sticky-btn-call {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 16px;
      background: rgba(15,23,42,0.98);
      border-top: 0.5px solid rgba(197,160,89,0.2);
      color: var(--gold);
      font-size: 0.72rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      text-decoration: none;
    }

    .sticky-btn-insta {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 16px;
      background: var(--gold);
      color: var(--bg);
      font-size: 0.72rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      text-decoration: none;
    }
  </style>
</head>
<body>

  <section class="hero">
    <div class="logo-container">
        <img src="logo.PNG" alt="DB Artisan Digital Logo">
    </div>

    <h1>L'artisanat local mérite<br><em>le meilleur du digital</em></h1>

    <p>Expert en solutions web à Sallanches et dans la Vallée de l'Arve.</p>

    <button class="btn-gold" onclick="openModal()">
      <span>Voir ma démo</span>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="position:relative;z-index:1;"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
    </button>
  </section>

  <div id="modal-overlay" onclick="handleOverlayClick(event)">
    <div id="modal-box">
      <button class="modal-close" onclick="closeModal()">×</button>
      <span class="modal-label">Accès démo</span>
      <p class="modal-title">Entrez votre code</p>
      <input
        id="code-input"
        class="modal-input"
        type="text"
        placeholder="Votre code ici"
        autocomplete="off"
        spellcheck="false"
        onkeydown="if(event.key==='Enter') submitCode()"
      />
      <p id="error-msg" class="error-msg"></p>
      <button class="btn-gold" style="width:100%; justify-content:center; margin-top:24px;" onclick="submitCode()">
        <span>Accéder</span>
      </button>
    </div>
  </div>

  <div class="sticky-cta">
    <a href="tel:+33600000000" class="sticky-btn-call">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 8.81 19.79 19.79 0 01.058 2.186 2 2 0 012 0h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 7.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>
      Appeler
    </a>
    <a href="https://instagram.com/ton_compte" target="_blank" class="sticky-btn-insta">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line></svg>
      Instagram
    </a>
  </div>

  <script>
     const CODES = {

      'DEMO1': 'https://u-revola.netlify.app/',

      'DEMO2': 'https://laspava.netlify.app/',

      "DEMO3": 'https://lessentiel-demo.netlify.app/',

      "DEMO4": 'https://latelierdutatoo.netlify.app/',

      "just'in": 'https://just-in-demo.netlify.app/',

    };

    function openModal() {
      document.getElementById('modal-overlay').classList.add('open');
      setTimeout(() => document.getElementById('code-input').focus(), 50);
    }

    function closeModal() {
      document.getElementById('modal-overlay').classList.remove('open');
      document.getElementById('code-input').value = '';
      document.getElementById('error-msg').textContent = '';
    }

    function handleOverlayClick(e) {
      if (e.target === document.getElementById('modal-overlay')) closeModal();
    }

    function submitCode() {
      const input = document.getElementById('code-input');
      const errorEl = document.getElementById('error-msg');
      const code = input.value.trim().toUpperCase();

      if (CODES[code]) {
        errorEl.textContent = '';
        window.location.href = CODES[code];
      } else {
        errorEl.textContent = 'Code invalide. Vérifiez et réessayez.';
        input.classList.remove('shake');
        void input.offsetWidth;
        input.classList.add('shake');
        input.addEventListener('animationend', () => {
          input.classList.remove('shake');
          input.style.borderColor = '';
        }, { once: true });
      }
    }
  </script>
</body>
</html>
